name: API Doc - Create Draft from Code

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: "Draft를 생성할 API 키 (예: GET /api/v1/todos)"
        required: true
      branch:
        description: "코드를 읽을 브랜치 (기본값: develop)"
        required: false
        default: "develop"

jobs:
  create-draft:
    name: Create Draft from Code
    uses: dev-billing/shared-workflows/.github/workflows/reusable-create-draft-from-code.yml@main
    with:
      api_key: ${{ inputs.api_key }}
      repo_name: ${{ github.repository }}
      branch: ${{ inputs.branch }}
    secrets: inherit
